version: '3.8'

services:
  web:
    build: .
    container_name: universe-reborn-web
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/app/logs
    depends_on:
      - db
    networks:
      - ur-network

  db:
    image: mariadb:10.11
    container_name: universe-reborn-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-universe_reborn}
      MYSQL_USER: ${DB_USER:-ur_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-urpassword}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - ur-network

  nginx:
    image: nginx:alpine
    container_name: universe-reborn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - ur-network

volumes:
  db-data:
  certbot-certs:

networks:
  ur-network:
    driver: bridge
